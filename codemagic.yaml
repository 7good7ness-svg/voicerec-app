workflows:

  # ===================================================
  # 開発用ワークフロー: シミュレータービルド＋スクリーンショット
  # （署名不要・Codemagic無料枠で動作）
  # ===================================================
  ios-simulator-demo:
    name: VoiceRec Simulator Build & Screenshots
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      vars:
        XCODE_PROJECT: "VoiceRec.xcodeproj"
        XCODE_SCHEME: "VoiceRec"
        BUNDLE_ID: "com.voicerec.app"
        SIMULATOR_NAME: "iPhone 15 Pro"
      xcode: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
        - pattern: main
          include: true

    scripts:
      - name: Resolve SPM dependencies
        script: |
          set -euo pipefail
          xcodebuild \
            -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"

      - name: Build for simulator (no signing)
        script: |
          set -euo pipefail
          # tee でログを保存しつつ xcpretty で表示
          # PIPESTATUS でビルドの終了コードを取得
          set -o pipefail
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "platform=iOS Simulator,name=$SIMULATOR_NAME" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath "$CM_BUILD_DIR/DerivedData" \
            build 2>&1 | tee /tmp/xcodebuild.log | xcpretty --color

      - name: Boot simulator, install & launch app
        script: |
          set -euo pipefail

          # クリーンスタート
          xcrun simctl shutdown all 2>/dev/null || true
          sleep 2

          # Python3 で JSON パース → 確実に UDID 取得
          UDID=$(xcrun simctl list devices available --json | python3 - <<'PYEOF'
import sys, json
data = json.load(sys.stdin)
name = "$SIMULATOR_NAME"
for runtime, devices in data["devices"].items():
    for d in devices:
        if d["name"] == name and d.get("isAvailable", False):
            print(d["udid"])
            sys.exit(0)
print("")
PYEOF
)

          if [ -z "$UDID" ]; then
            echo "=== ERROR: Simulator '$SIMULATOR_NAME' not found ==="
            echo "Available simulators:"
            xcrun simctl list devices available | grep -E "iPhone" | head -20
            exit 1
          fi
          echo "UDID: $UDID"
          echo "$UDID" > /tmp/sim_udid

          # 起動
          xcrun simctl boot "$UDID"
          open -a Simulator

          # Booted 状態になるまでポーリング（最大 120 秒）
          echo "Polling for 'Booted' state..."
          ELAPSED=0
          until xcrun simctl list devices | grep "$UDID" | grep -q "Booted"; do
            [ "$ELAPSED" -ge 120 ] && { echo "ERROR: Boot timeout"; exit 1; }
            sleep 5; ELAPSED=$((ELAPSED+5))
            echo "  ${ELAPSED}s ..."
          done
          echo "Booted in ${ELAPSED}s"

          # SpringBoard の UI が描画されるまで追加待機
          sleep 15

          # .app パスを検索（Watch 関連を除外）
          APP_PATH=$(find "$CM_BUILD_DIR/DerivedData" \
            -name "VoiceRec.app" \
            -not -path "*Watch*" \
            | head -1)

          [ -z "$APP_PATH" ] && {
            echo "=== ERROR: VoiceRec.app not found ==="
            find "$CM_BUILD_DIR/DerivedData" -name "*.app" | head -10
            exit 1
          }
          echo "App: $APP_PATH"

          # インストール＆起動
          xcrun simctl install "$UDID" "$APP_PATH"
          xcrun simctl launch "$UDID" "$BUNDLE_ID"

          # アプリ UI の描画待ち
          echo "Waiting 20s for app UI..."
          sleep 20

      - name: Capture screenshots
        script: |
          set -euo pipefail
          UDID=$(cat /tmp/sim_udid)
          mkdir -p "$CM_BUILD_DIR/screenshots"

          xcrun simctl io "$UDID" screenshot \
            "$CM_BUILD_DIR/screenshots/01_main.png"

          echo "Screenshots:"
          ls -lah "$CM_BUILD_DIR/screenshots/"

    artifacts:
      - $CM_BUILD_DIR/screenshots/*.png
      - /tmp/xcodebuild.log

    publishing:
      email:
        recipients:
          - 7good7ness@gmail.com
        notify:
          success: true
          failure: true

  # ===================================================
  # 本番ワークフロー: TestFlight配布
  # （Apple Developer Program $99/年 が必要）
  # ===================================================
  ios-testflight:
    name: VoiceRec iOS+Watch → TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: codemagic_api_key

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.voicerec.app
      vars:
        XCODE_PROJECT: "VoiceRec.xcodeproj"
        XCODE_SCHEME: "VoiceRec"
        BUNDLE_ID: "com.voicerec.app"
        WATCH_BUNDLE_ID: "com.voicerec.app.watchkitapp"
        APP_STORE_APPLE_ID: "YOUR_APP_APPLE_ID"  # ← 要変更
      xcode: latest

    triggering:
      events:
        - tag
      branch_patterns:
        - pattern: master
          include: true

    scripts:
      - name: Set build number from CI
        script: |
          set -euo pipefail
          BUILD_NUMBER=$(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID") + 1))
          agvtool new-version -all "$BUILD_NUMBER"
          echo "Build number: $BUILD_NUMBER"

      - name: Set up code signing
        script: |
          set -euo pipefail
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS --type IOS_APP_STORE --create
          app-store-connect fetch-signing-files "$WATCH_BUNDLE_ID" \
            --platform IOS --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Resolve SPM dependencies
        script: |
          set -euo pipefail
          xcodebuild \
            -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -clonedSourcePackagesDirPath "$CM_BUILD_DIR/spm_cache"

      - name: Build and archive
        script: |
          set -euo pipefail
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --cloned-source-packages-path "$CM_BUILD_DIR/spm_cache"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
      email:
        recipients:
          - 7good7ness@gmail.com
        notify:
          success: true
          failure: true
